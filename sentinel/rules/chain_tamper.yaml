id: 7c4f9c41-2a5e-4b8e-a3e0-d1c0a01a0006
name: Wirken - audit chain tamper detected
description: |
  Detection 6. Fires on every audit.chain_broken row in the
  legacy Wirken audit feed. Baseline severity is High; the rule
  promotes to Critical when the alarm-log feed
  (Custom_WirkenAlarms_CL) does not show a matching row by
  (SessionId, Seq) within 60 seconds.
severity: High
status: Available
requiredDataConnectors: []
queryFrequency: PT5M
queryPeriod: PT10M
triggerOperator: GreaterThan
triggerThreshold: 0
suppressionDuration: PT0M
suppressionEnabled: false
tactics:
  - Impact
relevantTechniques:
  - T1565
query: |
  let chain_broken =
    Custom_WirkenAudit_CL
    | where Action == "audit.chain_broken"
    | extend detail = parse_json(Detail)
    | project
        TimeGenerated,
        SessionId = tostring(detail.session_id),
        Seq = tolong(detail.seq),
        ExpectedHash = tostring(detail.expected_hash),
        ActualHash = tostring(detail.actual_hash),
        VerifiedCount = tolong(detail.verified_count);
  let alarm_rows =
    Custom_WirkenAlarms_CL
    | extend detail = parse_json(Detail)
    | project
        AlarmTime = TimeGenerated,
        SessionId = tostring(detail.session_id),
        Seq = tolong(detail.seq);
  chain_broken
  | join kind=leftouter alarm_rows on SessionId, Seq
  | extend
      AlarmDelta = iff(isnotnull(AlarmTime),
                       datetime_diff('second', AlarmTime, TimeGenerated),
                       int(null)),
      Severity = iff(isnotnull(AlarmTime) and abs(datetime_diff('second', AlarmTime, TimeGenerated)) <= 60,
                     "High", "Critical")
  | project
      TimeGenerated,
      SessionId,
      Seq,
      ExpectedHash,
      ActualHash,
      VerifiedCount,
      AlarmDelta,
      Severity
entityMappings:
  - entityType: AzureResource
    fieldMappings:
      - identifier: ResourceId
        columnName: SessionId

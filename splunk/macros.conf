[wirken_session_event]
definition = sourcetype="wirken:session" | spath input=event.event
#iseval = 0
#description = Surface the nested SessionEvent payload as top-level \
#  fields. The Wirken Splunk forwarder writes typed events with \
#  `event.event = { kind, calls, agent_id, adapter_id, ... }`; \
#  this macro lifts those fields so `arguments` and `calls{}.name` \
#  are reachable without per-search spath.

[wirken_argv_command(1)]
args = field
definition = spath input=$field$ path=command output=argv_command
#description = Parse a tool-call `arguments` JSON string and extract \
#  the `command` field. Apply to `event.event.calls{}.arguments` after \
#  `mvexpand event.event.calls{}`.

[wirken_argv_first_token(1)]
args = field
definition = eval argv_first = lower(replace(mvindex(split(trim($field$), " "), 0), ".*/", ""))
#description = Canonicalised first token of an argv string: strips \
#  any path component and lowercases. Matches the wirken-side \
#  `canonical_exec_prefix` so a saved search on `argv_first IN \
#  ("curl","wget",...)` catches `/usr/bin/CURL` too.

[wirken_legacy_detail_field(1)]
args = path
definition = spath input=detail output=$path$ path=$path$
#description = Extract a named field out of the legacy AuditEvent \
#  `detail` JSON. Used by Detection 6 to surface `seq`, \
#  `expected_hash`, `actual_hash`, `verified_count`.

[wirken_audit_legacy]
search = sourcetype="wirken:audit"
#description = Legacy AuditEvent rows forwarded by Wirken HEC. \
#  Includes gateway / adapter lifecycle, message inbound / outbound, \
#  permission denials emitted via the legacy pipe, and \
#  audit.chain_broken self-reports.

[wirken_audit_session]
search = sourcetype="wirken:session"
#description = Typed SessionEvent rows forwarded by Wirken HEC. \
#  Includes AssistantToolCalls, ToolResult, HttpFetch, \
#  PermissionDenied, SubagentSpawned, SubagentResult, ChainHead.

[wirken_audit_chain_broken]
search = sourcetype="wirken:audit" action="audit.chain_broken"
#description = Audit-chain integrity failure self-reports. \
#  Severity baseline high; promote to critical when the alarm \
#  log does not show a matching session_id+seq within 60s.

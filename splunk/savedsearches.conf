[wirken_d1_shell_outbound_fetch]
search = `wirken_session_event` event.event.kind="assistant_tool_calls" \
  | mvexpand event.event.calls{} \
  | search event.event.calls{}.name="exec" \
  | `wirken_argv_command(event.event.calls{}.arguments)` \
  | `wirken_argv_first_token(argv_command)` \
  | search argv_first IN ("curl","wget","msiexec","invoke-webrequest","iwr","bitsadmin","certutil") \
  | rex field=argv_command "(?<url>https?://[^\s'\"<>]+)" \
  | rex field=url "https?://(?<host>[^/:?#]+)" \
  | table _time session_id seq event.event.agent_id event.event.adapter_id event.event.sender_id event.event.calls{}.id host url argv_command
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 3
alert.suppress = 0
#description = Detection 1: shell-driven outbound fetch. Fires when \
#  the agent runs curl / wget / msiexec / Invoke-WebRequest / iwr / \
#  bitsadmin / certutil through the exec tool.

[wirken_d2_exec_fork_pairing]
search = `wirken_session_event` \
  ( event.event.kind="assistant_tool_calls" OR event.event.kind="tool_result" ) \
  | eval call_id = coalesce('event.event.calls{}.id', 'event.event.call_id') \
  | eval tool_name = coalesce('event.event.calls{}.name', 'event.event.tool_name') \
  | search tool_name="exec" \
  | transaction session_id call_id maxspan=10m \
  | eval duration_ms = duration*1000 \
  | eval output_size = if(isnotnull('event.event.output'), len('event.event.output'), 0) \
  | table _time session_id call_id event.event.agent_id event.event.adapter_id event.event.sender_id event.event.calls{}.arguments event.event.success duration_ms output_size
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 1
#description = Detection 2: child process fork pairing. Joins \
#  AssistantToolCalls to its matching ToolResult by (session_id, \
#  call_id) over a 10m window. Surfaces duration and output size for \
#  follow-on long-running / failed splits.

[wirken_d2_exec_fork_pairing_long_running]
search = `wirken_d2_exec_fork_pairing` | search duration_ms > 30000
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 2
#description = Detection 2 subset: exec calls longer than 30s.

[wirken_d2_exec_fork_pairing_failed]
search = `wirken_d2_exec_fork_pairing` | search event.event.success="false"
dispatch.earliest_time = -1h
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 2
#description = Detection 2 subset: exec calls that returned success=false.

[wirken_d3_binary_write]
search = `wirken_session_event` event.event.kind="assistant_tool_calls" \
  | mvexpand event.event.calls{} \
  | search event.event.calls{}.name="write_file" \
  | spath input=event.event.calls{}.arguments path=path output=file_path \
  | spath input=event.event.calls{}.arguments path=content output=file_content \
  | rex field=file_path "\.(?<extension>exe|dll|so|dylib|msi|scr|bat|ps1|sh|cmd|com|vbs|jar)$" \
  | eval magic = case( \
      substr(file_content, 1, 2) == "MZ", "pe_or_ne", \
      substr(file_content, 1, 4) == "ELF", "elf_text_prefix", \
      true(), null() \
    ) \
  | search (extension!="" OR isnotnull(magic)) \
  | table _time session_id seq event.event.agent_id event.event.adapter_id event.event.sender_id file_path extension magic
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 4
#description = Detection 3: binary write via write_file. Extension \
#  match runs against the full prefix list; content magic is a \
#  best-effort prefix check (Splunk's `substr` on UTF-8 strings \
#  misses several of the non-printable prefixes; webhook/rules.py \
#  carries the full set).

[wirken_d4_skill_dir_exec]
search = `wirken_session_event` event.event.kind="assistant_tool_calls" \
  | mvexpand event.event.calls{} \
  | search event.event.calls{}.name="exec" \
  | `wirken_argv_command(event.event.calls{}.arguments)` \
  | lookup wirken_skill_dirs prefix OUTPUT prefix AS matched_skill_dir \
  | where like(argv_command, "%".matched_skill_dir."%") \
  | table _time session_id seq event.event.agent_id event.event.adapter_id event.event.sender_id matched_skill_dir argv_command
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 4
#description = Detection 4: skill-dir-resident binary executed. \
#  Requires the `wirken_skill_dirs` lookup table populated with one \
#  prefix per row (column name `prefix`). An empty lookup makes the \
#  search return zero rows; operators see the gap in the README.

[wirken_d5_chain_tamper]
search = sourcetype="wirken:audit" action="audit.chain_broken" \
  | `wirken_legacy_detail_field(session_id)` \
  | `wirken_legacy_detail_field(seq)` \
  | `wirken_legacy_detail_field(expected_hash)` \
  | `wirken_legacy_detail_field(actual_hash)` \
  | `wirken_legacy_detail_field(verified_count)` \
  | join type=left session_id seq [ \
      search sourcetype="wirken:alarm-log" \
        earliest=-60s latest=+60s \
      | eval alarm_present="yes" \
      | table session_id seq alarm_present \
    ] \
  | eval severity = if(alarm_present="yes", "high", "critical") \
  | table _time session_id seq expected_hash actual_hash verified_count alarm_present severity
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 5
#description = Detection 5: chain tamper correlation. Baseline high; \
#  promotes to critical when the alarm-log feed does not show a \
#  matching (session_id, seq) within +/-60s. Wire the alarm log to \
#  Splunk as a distinct sourcetype `wirken:alarm-log`; see README.

[wirken_d6_mcp_entry_refused]
search = `wirken_session_event` event.event.kind="mcp_entry_refused" \
  | table _time session_id seq event.event.server_name event.event.reason
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 4
#description = Detection 6: MCP entry refused at proxy load. Fires \
#  on any McpEntryRefused row. `reason` is a closed-set snake_case \
#  label (signature_invalid / unsigned / signer_key_missing / \
#  signer_key_decode_failed / delegation_required). Any hit means \
#  the MCP client never spawned; investigate which mcp.json entry \
#  failed and why.

[wirken_d7_hook_refused]
search = `wirken_session_event` event.event.kind="hook_dispatched" \
  | search event.event.decision.kind IN ("deny","timeout") \
  | table _time session_id seq event.event.agent_id event.event.adapter_id event.event.sender_id event.event.hook_id event.event.tool_name event.event.decision.kind event.event.decision.reason
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 3
#description = Detection 7: veto hook denied or timed out. Fires on \
#  HookDispatched rows whose decision.kind is deny or timeout. \
#  Timeout is fail-closed in production (the tool call is refused); \
#  it lands on the chain so reviewers distinguish timeout from \
#  explicit deny.

[wirken_d8_tool_output_redacted]
search = `wirken_session_event` event.event.kind="tool_output_redacted" \
  | table _time session_id seq event.event.agent_id event.event.adapter_id event.event.sender_id event.event.call_id event.event.hook_id event.event.reason event.event.original_sha256 event.event.original_size event.event.redacted_sha256 event.event.redacted_size
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 3
#description = Detection 8: tool output redacted by egress hook. \
#  Fires on any ToolOutputRedacted row. Plaintext is not on the \
#  chain by design; original_sha256 is the only on-chain reference \
#  to the bytes the tool produced.

[wirken_d9_agent_cost_anomaly]
search = `wirken_session_event` event.event.kind="llm_response" \
  | `wirken_llm_cost_micros` \
  | where isnotnull(cost_micros) \
  | eval agent_id = 'event.event.agent_id' \
  | bin _time span=1h \
  | stats sum(cost_micros) as bucket_micros by _time agent_id \
  | eventstats max(_time) as latest_hour \
  | eval is_current = if(_time==latest_hour, 1, 0) \
  | eventstats avg(eval(if(is_current==0, bucket_micros, null()))) as baseline_micros, \
      count(eval(if(is_current==0, bucket_micros, null()))) as baseline_buckets by agent_id \
  | where is_current==1 \
  | eval multiplier = 3 \
  | eval min_baseline_buckets = 24 \
  | where baseline_buckets >= min_baseline_buckets AND baseline_micros > 0 \
      AND bucket_micros > (multiplier * baseline_micros) \
  | eval recent_usd = round(bucket_micros / 1000000.0, 4), \
      baseline_usd = round(baseline_micros / 1000000.0, 4), \
      breach_ratio = round(bucket_micros / baseline_micros, 2) \
  | table _time agent_id recent_usd baseline_usd breach_ratio multiplier baseline_buckets
dispatch.earliest_time = -7d@h
dispatch.latest_time = @h
enableSched = 1
cron_schedule = 5 * * * *
alert.severity = 3
alert.suppress = 0
#description = Detection 9: per-agent LLM cost anomaly. Buckets \
#  llm_response cost into 1h windows per agent_id, compares the most \
#  recent complete hour to that agent's mean hourly spend over the \
#  trailing 7 days, and fires when the recent hour exceeds \
#  multiplier * baseline. Reads total_cost_usd_micros via the \
#  wirken_llm_cost_micros macro. Tunables and defaults: bin span=1h is \
#  the window and dispatch.earliest_time=-7d is the baseline lookback \
#  (1h catches a step change within an hour; 7d smooths daily and \
#  weekly cycles); multiplier=3 is the breach factor (3x normal spend \
#  is a clear step, not hour-to-hour variance); min_baseline_buckets=24 \
#  suppresses agents with under a day of history so a cold start does \
#  not false-positive. Requires audit schema 1.6.0+ cost fields and the \
#  LlmResponse forwarder opt-in.

[wirken_d10_budget_exceeded]
search = `wirken_session_event` event.event.kind="budget_exceeded" \
  | table _time session_id seq event.event.agent_id event.event.credential_id event.event.action event.event.window event.event.window_spend_usd_micros event.event.ceiling_usd_micros
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
cron_schedule = */5 * * * *
alert.severity = 3
alert.suppress = 0
#description = Detection 10: per-agent budget exceeded. Fires on any \
#  budget_exceeded row emitted by the wirken runtime's pre-call budget \
#  gate. action=blocked means the LLM call was refused (an enforced \
#  stop); action=alerted means the ceiling was crossed and the call \
#  proceeded. Requires audit schema 1.12.0 (the budget_exceeded event) \
#  and the default budget_exceeded forwarding.
